<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Create a New Todo</h1>
    <form method="POST" action="/add" %>
        <p><strong>Title:</strong></p>
        <input name = "title" type = "text" placeholder="Enter title"><br>
        <p><strong>Description:</strong></p>
        <input name = "description" type = "text" placeholder="Enter Description"><br>
        <p><strong>Deadline:</strong></p>
        <input name = "deadline" type = "date" placeholder="Enter Description"><br>
        <br><button>Create Todo</button>
    </form>
</body>
</html>
